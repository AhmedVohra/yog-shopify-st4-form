# Shopify App Configuration
# This app provides:
#   1. Embedded Template Designer in Shopify Admin
#   2. Customer Fill & Sign form on the storefront (via App Proxy)
#
# Deployed with `shopify app deploy` (Shopify CLI). Do not hand-edit the
# client_id below except to match the app in the Partner Dashboard.

name = "PDF Signer & Form Builder"
client_id = "8f86ace95ee2d1c674d2786ea7fdb78f"
application_url = "https://yog-st4-form.azurewebsites.net/designer/embedded"
embedded = true

# ---- Access Scopes ----
[access_scopes]
scopes = "write_files,read_files,write_orders,read_orders,read_themes,write_themes,read_content,write_content"

# ---- OAuth ----
[auth]
redirect_urls = [
  "https://yog-st4-form.azurewebsites.net/auth/callback",
  "https://yog-st4-form.azurewebsites.net/designer"
]

# ---- Webhooks ----
[webhooks]
api_version = "2024-10"

# ---- App Proxy (customer form on storefront) ----
# Storefront URL becomes: {store}.myshopify.com/apps/pdf-signer/form?id=...
[app_proxy]
url = "https://yog-st4-form.azurewebsites.net/proxy"
subpath = "pdf-signer"
prefix = "apps"
